name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel older runs of the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest (min coverage 80%)
        run: pytest --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  test-deepagents:
    name: Tests with deepagents extra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies (with deepagents extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,deepagents]"

      - name: Verify the extra is installed (avoid silent skips)
        run: python -c "import deepagents, langchain_openai, langchain_anthropic"

      - name: Run pytest (includes deepagents integration tests)
        run: pytest --cov-report=xml

  migrations:
    name: Alembic migrations (PostgreSQL + pgvector)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: anfaia
          POSTGRES_PASSWORD: anfaia
          POSTGRES_DB: anfaia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anfaia -d anfaia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://anfaia:anfaia@localhost:5432/anfaia
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply migrations (upgrade head)
        run: alembic upgrade head

      - name: Revert migrations (downgrade base)
        run: alembic downgrade base

      - name: Reapply migrations (idempotency)
        run: alembic upgrade head
